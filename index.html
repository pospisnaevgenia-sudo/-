<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Ultra RTX Shaders 1.21 - Download</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background-color: #1a1a1b;
            color: #d7dadc;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        #download-btn, #fix-btn {
            position: absolute;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            white-space: nowrap;
        }

        #download-btn {
            background-color: #ff4500;
            transition: all 0.4s ease-out; /* Плавное убегание */
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #bsod {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #0078d7;
            color: white;
            padding: 100px;
            box-sizing: border-box;
            z-index: 9999;
        }

        #fix-btn {
            background-color: #ffffff;
            color: #0078d7;
            transition: all 0.05s linear; /* Очень быстрое убегание */
            display: none;
        }

        .sad-face { font-size: 120px; margin-bottom: 20px; }
        .bsod-text { font-size: 24px; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="container" id="main-ui">
        <h1>Ultra RTX Shaders 1.21</h1>
        <p>Версия: v.4.2.0-FINAL. Нажмите кнопку ниже для начала загрузки архива.</p>
        <button id="download-btn">СКАЧАТЬ .ZIP (42.5 MB)</button>
    </div>

    <div id="bsod">
        <div class="sad-face">:(</div>
        <div class="bsod-text">
            На вашем ПК возникла критическая ошибка из-за загрузки стороннего ПО.<br>
            Система заблокирована в целях безопасности.<br><br>
            Код остановки: SHADER_VIRUS_DETECTED
        </div>
        <button id="fix-btn">УСТРАНИТЬ ВИРУС</button>
    </div>

    <script>
        const btn = document.getElementById('download-btn');
        const fixBtn = document.getElementById('fix-btn');
        const bsod = document.getElementById('bsod');

        // Медленное убегание первой кнопки
        btn.onmouseover = () => {
            moveButton(btn);
        };

        // Логика нажатия на первую кнопку
        btn.onclick = () => {
            const msgs = ["Ошибка!", "Файлы повреждены!", "Удаление системы...", "Шутка! :)"];
            msgs.forEach(m => alert(m));
            
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
            
            bsod.style.display = 'block';
            fixBtn.style.display = 'block';
            // Центрируем кнопку "Устранить" изначально
            fixBtn.style.left = '50%';
            fixBtn.style.top = '80%';
        };

        // Сверхбыстрое убегание второй кнопки
        fixBtn.onmouseover = () => {
            moveButton(fixBtn);
        };

        // Кнопка ничего не делает при клике (если поймают)
        fixBtn.onclick = (e) => {
            e.preventDefault();
        };

        function moveButton(target) {
            const x = Math.random() * (window.innerWidth - target.clientWidth);
            const y = Math.random() * (window.innerHeight - target.clientHeight);
            target.style.left = x + 'px';
            target.style.top = y + 'px';
            target.style.transform = 'none';
        }

        window.onbeforeunload = () => "Вы уверены?";
    </script>
</body>
</html>

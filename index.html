<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Shaders Pack 1.20.1+</title>
    <style>
        body {
            background-color: #1a1a1b;
            color: #d7dadc;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            border: 1px solid #343536;
            padding: 40px;
            border-radius: 10px;
            background-color: #272729;
        }

        /* Плавное движение кнопки */
        #runBtn {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #0079d3;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            /* Добавляем задержку 0.4 секунды, чтобы кнопка не исчезала мгновенно */
            transition: all 0.4s ease; 
        }

        h1 { color: #00ff00; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Ultra Realistic Shaders</h1>
        <p>Статус: Готов к загрузке</p>
        <p>Нажми кнопку ниже, чтобы получить архив</p>
    </div>

    <button id="runBtn">СКАЧАТЬ ШЕЙДЕРЫ</button>

    <script>
        const btn = document.getElementById('runBtn');

        // УБЕГАЮЩАЯ КНОПКА (Медленная версия)
        btn.onmouseover = function() {
            // Кнопка начнет двигаться только через 100мс после наведения, 
            // давая шанс по ней кликнуть
            setTimeout(() => {
                const x = Math.random() * (window.innerWidth - btn.clientWidth);
                const y = Math.random() * (window.innerHeight - btn.clientHeight);
                btn.style.left = x + 'px';
                btn.style.top = y + 'px';
                btn.style.transform = 'none';
            }, 100); 
        };

        // ФИНАЛЬНОЕ СООБЩЕНИЕ
        btn.onclick = function() {
            alert("Поздравляю! Ты поймал кнопку! 🏆");
            alert("На самом деле это просто безобидный пранк.");
            alert("Никакого взлома нет, твой компьютер в полной безопасности.");
            alert("Сделано специально для тебя. Хорошего дня! 😉");
            
            // Возвращаем кнопку на место после победы
            btn.style.top = '60%';
            btn.style.left = '50%';
            btn.style.transform = 'translate(-50%, -50%)';
            btn.innerText = "ПРОВЕРКА ПРОЙДЕНА";
            btn.style.backgroundColor = "#28a745";
        };
    </script>
</body>
</html>
